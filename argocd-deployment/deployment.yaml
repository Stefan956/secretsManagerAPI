# ──────────────────────────────────────────────────────────────────────────────
# Pre-requisite (run once, never commit the real value to git):
#
#   kubectl create secret generic secrets-manager-key \
#     --from-literal=secret=<YOUR_SECRET_KEY> \
#     --namespace=default
#
# The Deployment mounts that Secret via an env var.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-manager-sa
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secrets-manager-api
  namespace: default
  labels:
    app: secrets-manager-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secrets-manager-api
  template:
    metadata:
      labels:
        app: secrets-manager-api
    spec:
      serviceAccountName: secrets-manager-sa
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: secrets-manager-api
          # CI updates this line on every push to main
          image: ghcr.io/stefan956/secrets-manager-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: secrets-manager-key
                  key: secret
          readinessProbe:
            httpGet:
              path: /swagger/index.html
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /swagger/index.html
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: secrets-manager-api
  namespace: default
spec:
  selector:
    app: secrets-manager-api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secrets-manager-role
rules:
  - apiGroups: [""]
    resources: ["namespaces", "secrets"]
    verbs: ["get", "list", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secrets-manager-rolebinding
subjects:
  - kind: ServiceAccount
    name: secrets-manager-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: secrets-manager-role
  apiGroup: rbac.authorization.k8s.io
