name: ArgoCD Deploy

# Builds, tests, pushes the Docker image, then updates the image tag in
# argocd-deployment/deployment.yaml and commits it back.  ArgoCD detects the
# commit and syncs the cluster automatically (auto-sync is on in the Application CR).
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# contents:write is required to commit the updated image tag back to the repo.
# GitHub Actions bot commits do NOT re-trigger workflow runs, so there is no loop.
permissions:
  contents: write
  packages: write

env:
  GOFLAGS: -mod=mod

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Tests (unit + integration via envtest)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Run tests (unit + integration)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: "1.25"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ github.workspace }}/.modcache
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Install Go dependencies
        run: go mod download

      - name: Run unit tests
        run: |
          set -euxo pipefail
          PKGS="$(go list ./... | grep -v -E '(^|/)(tests/integration|tests/e2e)$')"
          go test $PKGS -v

      - name: Install setup-envtest and download control-plane binaries
        run: |
          set -euxo pipefail
          mkdir -p ./testbin
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          ASSETS_PATH="$(setup-envtest use 1.25.0 -p path --bin-dir "$(pwd)/testbin" --force)"
          echo "KUBEBUILDER_ASSETS=$ASSETS_PATH" >> $GITHUB_ENV
          if [ ! -x "$ASSETS_PATH/etcd" ]; then
            echo "ERROR: etcd not found at $ASSETS_PATH/etcd"
            exit 1
          fi

      - name: Run integration tests (envtest)
        env:
          KUBEBUILDER_ASSETS: ${{ env.KUBEBUILDER_ASSETS }}
        run: |
          set -euxo pipefail
          go test ./tests/integration -v -count=1

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build & push Docker image, then update the manifest so ArgoCD syncs
  # ──────────────────────────────────────────────────────────────────────────
  build-push-deploy:
    name: Build, push & update ArgoCD manifest
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN — bot commits won't re-trigger this workflow
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo owner
        run: |
          echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/secrets-manager-api:latest
            ghcr.io/${{ env.OWNER_LC }}/secrets-manager-api:${{ github.sha }}

      # Replace whatever image tag is currently in the manifest with the new SHA.
      # The pattern matches any tag after the last colon so it is idempotent.
      - name: Update image tag in ArgoCD deployment manifest
        run: |
          NEW_IMAGE="ghcr.io/${{ env.OWNER_LC }}/secrets-manager-api:${{ github.sha }}"
          sed -i "s|image: ghcr.io/.*/secrets-manager-api:.*|image: ${NEW_IMAGE}|" \
            ArgoCDDeployment/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ArgoCDDeployment/deployment.yaml
          # Only commit if the file actually changed (idempotent on re-runs)
          git diff --staged --quiet || \
            git commit -m "ci: bump image tag to ${{ github.sha }}"
          git push
