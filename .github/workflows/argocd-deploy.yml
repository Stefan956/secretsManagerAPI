name: ArgoCD Deploy

# Manually triggered only. Builds a new image (or uses a provided SHA),
# then opens a PR to update argocd-deployment/deployment.yaml.
on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Git SHA of the image to deploy (e.g. a3f1c8d92b4e). Leave blank to build & push from current commit."
        required: false
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  GOFLAGS: -mod=mod

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Tests (unit + integration via envtest)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Run tests (unit + integration)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: "1.25"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ github.workspace }}/.modcache
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Install Go dependencies
        run: go mod download

      - name: Run unit tests
        run: |
          set -euxo pipefail
          PKGS="$(go list ./... | grep -v -E '(^|/)(tests/integration|tests/e2e)$')"
          go test $PKGS -v

      - name: Install setup-envtest and download control-plane binaries
        run: |
          set -euxo pipefail
          mkdir -p ./testbin
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          ASSETS_PATH="$(setup-envtest use 1.25.0 -p path --bin-dir "$(pwd)/testbin" --force)"
          echo "KUBEBUILDER_ASSETS=$ASSETS_PATH" >> $GITHUB_ENV
          if [ ! -x "$ASSETS_PATH/etcd" ]; then
            echo "ERROR: etcd not found at $ASSETS_PATH/etcd"
            exit 1
          fi

      - name: Run integration tests (envtest)
        env:
          KUBEBUILDER_ASSETS: ${{ env.KUBEBUILDER_ASSETS }}
        run: |
          set -euxo pipefail
          go test ./tests/integration -v -count=1

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build & push Docker image, then open a PR to update the manifest
  # ──────────────────────────────────────────────────────────────────────────
  build-push-deploy:
    name: Build, push & update ArgoCD manifest
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo owner
        run: |
          echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3
        if: inputs.image_sha == ''
      - uses: docker/setup-buildx-action@v3
        if: inputs.image_sha == ''

      - name: Login to GitHub Container Registry
        if: inputs.image_sha == ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: inputs.image_sha == ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ env.OWNER_LC }}/secrets-manager-api:${{ github.sha }}

      - name: Create branch, update manifest, and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_SHA="${{ inputs.image_sha }}"
          if [ -z "${TARGET_SHA}" ]; then
            TARGET_SHA="${{ github.sha }}"
          fi

          SHORT="${TARGET_SHA:0:12}"
          BRANCH="deploy/update-image-${SHORT}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"

          NEW_IMAGE="ghcr.io/${{ env.OWNER_LC }}/secrets-manager-api:${TARGET_SHA}"
          sed -i "s|image: ghcr.io/.*/secrets-manager-api:.*|image: ${NEW_IMAGE}|" \
            argocd-deployment/deployment.yaml

          echo "--- updated image line ---"
          grep "image:" argocd-deployment/deployment.yaml

          git add argocd-deployment/deployment.yaml
          git commit -m "deploy: update secrets-manager-api to ${TARGET_SHA}"
          git push --force origin "${BRANCH}"

          echo "## Image Update" > /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          echo "Image: ghcr.io/${{ env.OWNER_LC }}/secrets-manager-api:${TARGET_SHA}" >> /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          echo "Merge this PR to main — ArgoCD will detect the commit and roll out new pods automatically." >> /tmp/pr-body.md

          gh pr create \
            --title "deploy: update secrets-manager-api to ${TARGET_SHA}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "${BRANCH}"
